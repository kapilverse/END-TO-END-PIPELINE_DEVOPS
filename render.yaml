services:
  # 1. The FastAPI Backend
  - type: web
    name: urbanpulse-api
    env: python
    buildCommand: |
      cd app
      pip install -r requirements.txt
    startCommand: |
      cd app
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urbanpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # 2. The Web Frontend (Vite)
  - type: web
    name: urbanpulse-web
    env: static
    buildCommand: |
      cd web
      npm install
      npm run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        value: https://urbanpulse-api.onrender.com # You'll update this once deployed

databases:
  - name: urbanpulse-db
    databaseName: urbanpulse
    user: admin
    plan: free # Use 'free' for demo, 'standard' for production
