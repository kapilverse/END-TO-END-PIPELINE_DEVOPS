services:
  # 1. The FastAPI Backend (Monolith serving React Frontend)
  - type: web
    name: urbanpulse-api
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free # Change to 'pro' if needed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urbanpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: urbanpulse-db
    databaseName: urbanpulse
    user: admin
    plan: free # Use 'free' for demo, 'standard' for production
