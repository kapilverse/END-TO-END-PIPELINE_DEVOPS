services:
  # 1. The FastAPI Backend
  - type: web
    name: urbanpulse-api
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free # Change to 'pro' if needed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urbanpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # 2. The Web Frontend (Vite)
  - type: web
    name: urbanpulse-web
    runtime: static
    rootDir: .
    buildCommand: |
      cd web
      npm install
      npm run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        value: https://urbanpulse-api.onrender.com # You'll update this once deployed

databases:
  - name: urbanpulse-db
    databaseName: urbanpulse
    user: admin
    plan: free # Use 'free' for demo, 'standard' for production
