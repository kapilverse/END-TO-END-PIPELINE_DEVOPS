name: CD - Production Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Scan and Deploy
    # This tells GitHub to run the job on YOUR laptop instead of the cloud
    runs-on: self-hosted 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: ./app
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/urbanpulse-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/urbanpulse-api:${{ github.sha }}

    - name: Deploy to Local Kubernetes
      # Since it's self-hosted, we assume kubectl and helm are already installed on your laptop
      run: |
        helm upgrade --install urbanpulse ./charts/web-app `
          --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/urbanpulse-api `
          --set image.tag=${{ github.sha }} `
          --namespace production --create-namespace `
          --wait
        
        echo "✅ Deployment successful on your local Docker Desktop cluster!"
      shell: powershell

    - name: Verify Service Health
      run: |
        kubectl rollout status deployment/urbanpulse -n production
        echo "🚀 Application is live on your local machine!"
      shell: powershell
