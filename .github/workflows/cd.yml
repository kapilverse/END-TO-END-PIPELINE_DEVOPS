name: CD - Deploy to K8s

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/k8s-cicd-demo-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/k8s-cicd-demo-app:${{ github.sha }}

    - name: Security Scan Image (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/k8s-cicd-demo-app:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Fail the build if critical vulnerabilities are found
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy to Kubernetes
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
      run: |
        if [ -z "$KUBECONFIG_DATA" ]; then
          echo "⚠️ KUBECONFIG secret is missing. Skipping actual deployment."
          echo "Simulated: helm upgrade --install web-app ./charts/web-app --set image.tag=${{ github.sha }}"
        else
          # Setup KUBECONFIG
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          
          # Actual Helm Deployment
          helm upgrade --install web-app ./charts/web-app \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/k8s-cicd-demo-app \
            --set image.tag=${{ github.sha }} \
            --namespace production --create-namespace \
            --wait --timeout 5m
            
          echo "✅ Deployment successful!"
        fi

    - name: Verify Deployment Health
      if: env.KUBECONFIG_DATA != ''
      run: |
        kubectl rollout status deployment/web-app -n production
        echo "Application is live and healthy!"
